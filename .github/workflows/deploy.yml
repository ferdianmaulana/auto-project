name: Deploy to Lighthouse

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/project-pipeline

            # Pull latest code
            git pull origin main

            # Write GCP credentials to file from env (injected by GitHub Actions)
            echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > ~/project-pipeline/gcp-credentials.json

            # Rebuild if Dockerfile OR requirements.txt changed
            if git diff HEAD~1 --name-only | grep -qE "Dockerfile|requirements.txt"; then
              echo "Dockerfile or requirements.txt changed — rebuilding..."
              sudo docker compose down
              sudo docker compose build --no-cache
              sudo docker compose up airflow-init
            else
              echo "No rebuild needed — skipping"
            fi
            
            # Restart services
            sudo docker compose up -d

            echo "✅ Deployment complete!"