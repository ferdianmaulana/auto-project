name: Deploy to Lighthouse

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/project-pipeline

            sudo chown -R ubuntu:ubuntu ~/project-pipeline

            # Pull latest code
            git pull origin main

            # Write GCP credentials to file from env (injected by GitHub Actions)
            echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > ~/project-pipeline/gcp-credentials.json
            
            echo "AIRFLOW_SECRET_KEY=${{ secrets.AIRFLOW_SECRET_KEY }}" > ~/project-pipeline/.env

            # Rebuild Docker image if Dockerfile changed
            sudo docker compose build

            # Restart services with new code
            sudo docker compose up -d

            echo "Deployment complete!"